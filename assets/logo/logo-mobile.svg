<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#1E1E36" />
      <stop offset="60%" style="stop-color:#14142A" />
      <stop offset="100%" style="stop-color:#0C0C1A" />
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#4FC3F7; stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#4FC3F7; stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="55%" r="50%">
      <stop offset="0%" style="stop-color:#B388FF; stop-opacity:0.14" />
      <stop offset="100%" style="stop-color:#B388FF; stop-opacity:0" />
    </radialGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7" />
      <stop offset="50%" style="stop-color:#29B6F6" />
      <stop offset="100%" style="stop-color:#0288D1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7C4DFF" />
      <stop offset="60%" style="stop-color:#B388FF" />
      <stop offset="100%" style="stop-color:#D500F9" />
    </linearGradient>
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
      <feOffset dx="0" dy="10" result="offsetBlur" />
      <feComponentTransfer in="offsetBlur">
        <feFuncA type="linear" slope="0.30" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="kGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7; stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#FFFFFF; stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#B388FF; stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF" />
      <stop offset="50%" style="stop-color:#F8F8FF" />
      <stop offset="100%" style="stop-color:#E8E8F0" />
    </linearGradient>
    <linearGradient id="phoneAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C4DFF" />
      <stop offset="100%" style="stop-color:#4FC3F7" />
    </linearGradient>
    <filter id="accentGlow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="512" height="512" rx="115" />
    </clipPath>
  </defs>
  <g clip-path="url(#iconClip)">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)" />
    <ellipse cx="256" cy="240" rx="220" ry="220" fill="url(#glow1)" />
    <ellipse cx="256" cy="280" rx="200" ry="200" fill="url(#glow2)" />
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#FFFFFF" stroke-opacity="0.012" stroke-width="0.5" />
    </pattern>
    <rect x="0" y="0" width="512" height="512" fill="url(#grid)" />
    <g filter="url(#glass)">
      <rect x="95" y="155" width="240" height="240" rx="50" fill="url(#purpleGrad)" opacity="0.85" transform="rotate(-12, 215, 275)" />
    </g>
    <rect x="95" y="155" width="240" height="240" rx="50" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="2" transform="rotate(-12, 215, 275)" />
    <rect x="112" y="167" width="110" height="10" rx="5" fill="#FFFFFF" opacity="0.08" transform="rotate(-12, 215, 275)" />
    <g filter="url(#glass)">
      <rect x="177" y="117" width="240" height="240" rx="50" fill="url(#cyanGrad)" opacity="0.85" transform="rotate(12, 297, 237)" />
    </g>
    <rect x="177" y="117" width="240" height="240" rx="50" fill="none" stroke="#FFFFFF" stroke-opacity="0.09" stroke-width="2" transform="rotate(12, 297, 237)" />
    <rect x="196" y="130" width="90" height="10" rx="5" fill="#FFFFFF" opacity="0.10" transform="rotate(12, 297, 237)" />
    <path d="M 170,136 L 222,136 L 222,200 L 294,136 L 346,136 L 258,232 L 346,328 L 294,328 L 222,248 L 222,328 L 170,328 Z" fill="#000000" opacity="0.12" filter="url(#kGlow)" transform="translate(2, 3)" />
    <path d="M 170,136 L 222,136 L 222,200 L 294,136 L 346,136 L 258,232 L 346,328 L 294,328 L 222,248 L 222,328 L 170,328 Z" fill="url(#kGrad)" opacity="0.95" />
    <path d="M 170,136 L 222,136 L 222,200 L 294,136 L 346,136 L 258,232 L 346,328 L 294,328 L 222,248 L 222,328 L 170,328 Z" fill="none" stroke="url(#strokeGrad)" stroke-width="2.5" />
    <path d="M 182,148 L 210,148 L 210,202 L 280,148 L 330,148 L 253,228 L 328,312 L 284,312 L 218,242 L 218,312 L 182,312 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="1.5" />
    <!-- 移动端特有：底部彩色横线 -->
    <rect x="156" y="372" width="200" height="6" rx="3" fill="url(#phoneAccent)" opacity="0.7" filter="url(#accentGlow)" />
    <rect x="170" y="386" width="172" height="4" rx="2" fill="url(#phoneAccent)" opacity="0.4" />
    <circle cx="92" cy="92" r="2" fill="#4FC3F7" opacity="0.25" />
    <circle cx="430" cy="430" r="2" fill="#B388FF" opacity="0.20" />
    <circle cx="80" cy="420" r="1.5" fill="#4FC3F7" opacity="0.18" />
    <circle cx="440" cy="88" r="1.5" fill="#B388FF" opacity="0.18" />
  </g>
  <rect x="2.5" y="2.5" width="507" height="507" rx="112" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="2.5" />
</svg>
