<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="80%">
      <stop offset="0%" style="stop-color:#1A1A2E" />
      <stop offset="50%" style="stop-color:#16213E" />
      <stop offset="100%" style="stop-color:#0F0F1A" />
    </radialGradient>
    <radialGradient id="glow1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#4FC3F7; stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4FC3F7; stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#B388FF; stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#B388FF; stop-opacity:0" />
    </radialGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7" />
      <stop offset="40%" style="stop-color:#29B6F6" />
      <stop offset="100%" style="stop-color:#0288D1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7C4DFF" />
      <stop offset="50%" style="stop-color:#B388FF" />
      <stop offset="100%" style="stop-color:#E040FB" />
    </linearGradient>
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur" />
      <feOffset dx="0" dy="12" result="offsetBlur" />
      <feComponentTransfer in="offsetBlur">
        <feFuncA type="linear" slope="0.35" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="glow" />
      <feOffset dx="-3" dy="-3" />
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff" />
      <feFlood flood-color="#FFFFFF" flood-opacity="0.12" />
      <feComposite in2="shadowDiff" operator="in" />
      <feComposite in2="SourceGraphic" operator="over" />
    </filter>
    <filter id="kGlow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7; stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#FFFFFF; stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#B388FF; stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="arrowCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7" />
      <stop offset="100%" style="stop-color:#00E5FF" />
    </linearGradient>
    <linearGradient id="arrowPurple" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7C4DFF" />
      <stop offset="100%" style="stop-color:#EA80FC" />
    </linearGradient>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF" />
      <stop offset="60%" style="stop-color:#FFFFFF" />
      <stop offset="100%" style="stop-color:#E0E0E0" />
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="512" height="512" rx="112" />
    </clipPath>
  </defs>
  <g clip-path="url(#iconClip)">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)" />
    <ellipse cx="160" cy="150" rx="200" ry="200" fill="url(#glow1)" />
    <ellipse cx="380" cy="380" rx="200" ry="200" fill="url(#glow2)" />
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.015" stroke-width="0.5" />
    </pattern>
    <rect x="0" y="0" width="512" height="512" fill="url(#grid)" />
    <g filter="url(#glass)">
      <rect x="100" y="180" width="235" height="235" rx="48" fill="url(#purpleGrad)" opacity="0.88" transform="rotate(-14, 217, 297)" />
    </g>
    <rect x="100" y="180" width="235" height="235" rx="48" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2" transform="rotate(-14, 217, 297)" />
    <rect x="115" y="190" width="120" height="12" rx="6" fill="#FFFFFF" opacity="0.10" transform="rotate(-14, 217, 297)" />
    <g filter="url(#glass)">
      <rect x="177" y="97" width="235" height="235" rx="48" fill="url(#cyanGrad)" opacity="0.88" transform="rotate(14, 294, 214)" />
    </g>
    <rect x="177" y="97" width="235" height="235" rx="48" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2" transform="rotate(14, 294, 214)" />
    <rect x="195" y="108" width="100" height="10" rx="5" fill="#FFFFFF" opacity="0.12" transform="rotate(14, 294, 214)" />
    <path d="M 173,128 L 219,128 L 219,186 L 287,128 L 339,128 L 253,226 L 339,314 L 287,314 L 219,240 L 219,314 L 173,314 Z" fill="#000000" opacity="0.15" filter="url(#kGlow)" transform="translate(2, 4)" />
    <path d="M 173,128 L 219,128 L 219,186 L 287,128 L 339,128 L 253,226 L 339,314 L 287,314 L 219,240 L 219,314 L 173,314 Z" fill="url(#kGrad)" opacity="0.95" filter="url(#innerGlow)" />
    <path d="M 173,128 L 219,128 L 219,186 L 287,128 L 339,128 L 253,226 L 339,314 L 287,314 L 219,240 L 219,314 L 173,314 Z" fill="none" stroke="url(#strokeGrad)" stroke-width="2.5" />
    <path d="M 183,138 L 209,138 L 209,190 L 275,138 L 325,138 L 250,222 L 323,300 L 277,300 L 219,234 L 219,300 L 183,300 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5" />
    <g transform="translate(395, 102) rotate(42)">
      <rect x="-22" y="-26" width="44" height="10" rx="5" fill="url(#arrowCyan)" opacity="0.95" />
      <polygon points="-14,-36 0,-21 -14,-6" fill="url(#arrowCyan)" opacity="0.95" />
      <rect x="-18" y="-24" width="36" height="3" rx="1.5" fill="#FFFFFF" opacity="0.30" />
    </g>
    <g transform="translate(117, 390) rotate(222)">
      <rect x="-22" y="-26" width="44" height="10" rx="5" fill="url(#arrowPurple)" opacity="0.95" />
      <polygon points="-14,-36 0,-21 -14,-6" fill="url(#arrowPurple)" opacity="0.95" />
      <rect x="-18" y="-24" width="36" height="3" rx="1.5" fill="#FFFFFF" opacity="0.25" />
    </g>
    <circle cx="78" cy="86" r="2.5" fill="#4FC3F7" opacity="0.30" />
    <circle cx="440" cy="420" r="2" fill="#B388FF" opacity="0.25" />
    <circle cx="460" cy="80" r="1.5" fill="#4FC3F7" opacity="0.20" />
    <circle cx="60" cy="400" r="1.5" fill="#B388FF" opacity="0.20" />
    <circle cx="400" cy="460" r="1" fill="#FFFFFF" opacity="0.15" />
    <circle cx="100" cy="60" r="1" fill="#FFFFFF" opacity="0.12" />
  </g>
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="3" />
  <rect x="5" y="5" width="502" height="502" rx="107" fill="none" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1" />
</svg>
